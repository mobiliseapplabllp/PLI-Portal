# Fly.io deploy config. Quickstart:
#   fly launch --no-deploy        # creates the app (accept this fly.toml)
#   fly postgres create           # then: fly postgres attach <db-app>  (sets DATABASE_URL)
#   fly volumes create mid_data --size 5
#   fly secrets set SECRET_KEY=$(openssl rand -hex 32)
#   fly deploy
app = "mid-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  AI_ENGINE_MODE = "mock"
  UPLOAD_DIR = "/data/uploads"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      path = "/api/health"
      interval = "15s"
      timeout = "3s"

[[mounts]]
  source = "mid_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"       # bump to 2-4gb for AI_ENGINE_MODE=real
