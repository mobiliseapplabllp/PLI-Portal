<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MID · AI Diagnostic Assistant</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Login -->
  <div id="login-view" class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="logo">✚</div>
        <div><h1>Diagnostic Assistant</h1><p>Multi-tenant AI for clinical imaging</p></div>
      </div>
      <label>Email</label>
      <input id="email" value="admin@city-general.demo" autocomplete="username" />
      <label>Password</label>
      <input id="password" type="password" value="demo1234" autocomplete="current-password" />
      <div style="height:16px"></div>
      <button id="login-btn" class="btn block">Sign in</button>
      <p id="login-error" class="err hidden"></p>
      <p class="hint">Demo accounts · <code>admin@city-general.demo</code> · <code>admin@sunrise-dx.demo</code> · password <code>demo1234</code></p>
    </div>
  </div>

  <!-- App -->
  <div id="app-view" class="app hidden">
    <header class="topbar">
      <div class="brand-mini"><span class="logo-sm">✚</span> Diagnostic Assistant</div>
      <div class="topbar-right">
        <button id="models-btn" class="link">AI Models</button>
        <div class="who" id="who"></div>
        <div class="avatar" id="avatar">—</div>
        <button id="logout-btn" class="link">Sign out</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>Patients</h2>
          <button id="new-patient-btn" class="link">+ New</button>
        </div>
        <div class="search"><input id="patient-search" placeholder="Search patients…" /></div>
        <div id="patient-list" class="plist"></div>
      </aside>

      <main class="main">
        <div id="empty-state" class="empty">
          <div class="big">🩻</div>
          <p>Select a patient to view their unified profile and AI correlation.</p>
        </div>
        <div id="profile"></div>
      </main>
    </div>
  </div>

  <div id="modal-root"></div>
  <script src="/app.js"></script>
</body>
</html>
