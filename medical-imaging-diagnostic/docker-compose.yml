# Deployment: stateless API + Postgres.
# The API is stateless and designed to scale horizontally behind a load
# balancer. To actually run multiple replicas, remove the fixed `ports:` host
# binding below (a single host port can't map to N containers) and put a
# reverse proxy (nginx/traefik) in front, then:  docker compose up --scale api=3
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mid
      POSTGRES_PASSWORD: mid
      POSTGRES_DB: mid
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mid"]
      interval: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://mid:mid@db:5432/mid
      SECRET_KEY: change-me-in-production
      AI_ENGINE_MODE: mock
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  db_data:
  uploads:
