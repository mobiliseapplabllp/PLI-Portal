# One-command full stack: Postgres + app (API + built UI). MONAI Label is an
# optional profile (heavy) for real CT/MRI segmentation.
#
#   docker compose up --build                    # app + postgres
#   docker compose --profile monai up --build    # + real MONAI Label engine
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mid
      POSTGRES_PASSWORD: mid
      POSTGRES_DB: mid
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mid"]
      interval: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://mid:mid@db:5432/mid
      SECRET_KEY: change-me-in-production
      AI_ENGINE_MODE: ${AI_ENGINE_MODE:-mock}   # mock | real | monai
      MONAI_LABEL_URL: http://monailabel:8000
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  # Real CT/MRI segmentation model server (opt-in; large image).
  monailabel:
    build: ./monai
    profiles: ["monai"]
    volumes:
      - monai_models:/models
      - monai_studies:/studies
    # Uncomment to use a GPU (requires the NVIDIA container toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{ capabilities: ["gpu"] }]

volumes:
  db_data:
  uploads:
  monai_models:
  monai_studies:
